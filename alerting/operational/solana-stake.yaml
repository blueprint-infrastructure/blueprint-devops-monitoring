groups:
  - name: solana_stake
    interval: 60s
    rules:
      - alert: SolanaStakeSignificantChange
        expr: |
          round(
            (
              solana_validator_activated_stake_lamports
              - solana_validator_activated_stake_lamports offset 1d
            ) / solana_validator_activated_stake_lamports offset 1d * 100
          )
          and
          abs(
            solana_validator_activated_stake_lamports
            - solana_validator_activated_stake_lamports offset 1d
          ) / solana_validator_activated_stake_lamports offset 1d > 0.1
          and solana_validator_activated_stake_lamports offset 1d > 0
        for: 5m
        labels:
          severity: high
          chain: solana
        annotations:
          summary: "Solana validator stake changed by {{ $values.A.Value }}% on {{ $labels.instance }}"
          description: "Solana validator activated stake on {{ $labels.instance }} has changed by {{ $values.A.Value }}% in the last 24 hours. Common causes: delegator unstake, epoch boundary rebalance, or staking pool rotation. Check current vs 24h-ago stake on the Grafana dashboard."
          runbook_url: "https://github.com/blueprint-infrastructure/blueprint-devops-monitoring/blob/main/runbooks/solana-stake-change.md"
