groups:
  - name: cpu_memory_network
    interval: 30s
    rules:
      - alert: HighCPU
        expr: |
          100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle",chain!="audius"}[5m])) * 100) > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage is above 85% ({{ $values.A.Value }}%) on {{ $labels.instance }} for more than 10 minutes"
          runbook_url: "https://github.com/blueprint-infrastructure/blueprint-devops-monitoring/blob/main/runbooks/high-cpu.md"

      - alert: HighCPUCritical
        expr: |
          100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle",chain!="audius"}[5m])) * 100) > 95
        for: 5m
        labels:
          severity: high
        annotations:
          summary: "Critical CPU usage on {{ $labels.instance }}"
          description: "CPU usage is above 95% ({{ $values.A.Value }}%) on {{ $labels.instance }} for more than 5 minutes"
          runbook_url: "https://github.com/blueprint-infrastructure/blueprint-devops-monitoring/blob/main/runbooks/high-cpu.md"

      - alert: MemoryPressure
        expr: |
          (
            (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100
          ) < 15
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Memory pressure on {{ $labels.instance }}"
          description: "Available memory is below 15% ({{ $values.A.Value }}% available) on {{ $labels.instance }} for more than 10 minutes"
          runbook_url: "https://github.com/blueprint-infrastructure/blueprint-devops-monitoring/blob/main/runbooks/high-cpu.md"

      - alert: MemoryPressureCritical
        expr: |
          (
            (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100
          ) < 5
        for: 5m
        labels:
          severity: high
        annotations:
          summary: "Critical memory pressure on {{ $labels.instance }}"
          description: "Available memory is below 5% ({{ $values.A.Value }}% available) on {{ $labels.instance }} for more than 5 minutes"
          runbook_url: "https://github.com/blueprint-infrastructure/blueprint-devops-monitoring/blob/main/runbooks/high-cpu.md"

      - alert: NetworkUtilizationHigh
        expr: |
          (
            rate(node_network_transmit_bytes_total{device!~"lo|veth.*|docker.*|br-.*"}[5m]) * 8
          ) / (
            node_network_speed_bytes{device!~"lo|veth.*|docker.*|br-.*"} * 8
          ) > 0.95
        for: 5m
        labels:
          severity: high
        annotations:
          summary: "Network utilization above 95% on {{ $labels.instance }}:{{ $labels.device }}"
          description: "Network interface {{ $labels.device }} on {{ $labels.instance }} is saturated (>95% utilization) for more than 5 minutes"
          runbook_url: "https://github.com/blueprint-infrastructure/blueprint-devops-monitoring/blob/main/runbooks/high-cpu.md"
