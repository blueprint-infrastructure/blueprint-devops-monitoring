groups:
  - name: disk
    interval: 30s
    rules:
      - alert: DiskSpaceLow
        expr: |
          (
            (node_filesystem_avail_bytes{mountpoint!~"/tmp|/var/tmp|/run|/sys|/proc|/dev|/boot|/var/lib/docker/overlay.*",fstype=~"ext4|xfs|btrfs"} / node_filesystem_size_bytes{mountpoint!~"/tmp|/var/tmp|/run|/sys|/proc|/dev|/boot|/var/lib/docker/overlay.*",fstype=~"ext4|xfs|btrfs"}) * 100
          ) < 15
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Disk space is low on {{ $labels.instance }}:{{ $labels.mountpoint }}"
          description: "Disk space is below 15% ({{ $values.A.Value }}% available) on {{ $labels.instance }}:{{ $labels.mountpoint }} for more than 10 minutes"
          runbook_url: "https://github.com/blueprint-infrastructure/blueprint-devops-monitoring/blob/main/runbooks/disk-full.md"

      - alert: DiskSpaceCritical
        expr: |
          (
            (node_filesystem_avail_bytes{mountpoint!~"/tmp|/var/tmp|/run|/sys|/proc|/dev|/boot|/var/lib/docker/overlay.*",fstype=~"ext4|xfs|btrfs"} / node_filesystem_size_bytes{mountpoint!~"/tmp|/var/tmp|/run|/sys|/proc|/dev|/boot|/var/lib/docker/overlay.*",fstype=~"ext4|xfs|btrfs"}) * 100
          ) < 5
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Disk space is critically low on {{ $labels.instance }}:{{ $labels.mountpoint }}"
          description: "Disk space is below 5% ({{ $values.A.Value }}% available) on {{ $labels.instance }}:{{ $labels.mountpoint }} for more than 5 minutes"
          runbook_url: "https://github.com/blueprint-infrastructure/blueprint-devops-monitoring/blob/main/runbooks/disk-full.md"
